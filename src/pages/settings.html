<!DOCTYPE html>
<title>Browser Settings</title>

<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
    @import url("agregore://theme/style.css");
</style>

<h1>Settings</h1>
<form id="settingsForm">
    <fieldset>
        <label>Default Page: <input name="defaultPage"></label>
        <label>Auto-Hide Menu Bar: <input name="autoHideMenuBar"></label>
        <label>Search Provider URI Template: <input name="searchProvider" list="searchProviders" id="searchProviderInput"></label>
        <datalist id="searchProviders">
          <option value="https://noai.duckduckgo.com/?ia=web&q=%s">DuckDuckGo (No AI)</option>
          <option value="https://duckduckgo.com/?ia=web&q=%s">DuckDuckGo (With AI)</option>
          <option value="https://search.brave.com/search?q=%s">Brave Search</option>
          <option value="https://www.startpage.com/do/dsearch?query=%s">Startpage</option>
          <option value="https://searx.be/?q=%s">SearX (searx.be)</option>
          <option value="https://search.disroot.org/?q=%s">SearXNG (disroot)</option>
          <option value="https://www.ecosia.org/search?q=%s">Ecosia</option>
          <option value="https://www.mojeek.com/search?q=%s">Mojeek</option>
          <option value="https://www.kagi.com/search?q=%s">Kagi</option>
          <option value="https://www.gibiru.com/?q=%s">Gibiru</option>
          <option value="https://www.artadosearch.com/search?Button1=Artado&i=%s">ArtadoSearch</option>
        </datalist>
      
    </fieldset>
    <fieldset>
        <legend id="theme">Theme</legend>
        <p>
          <a href="agregore://settings/theme">Visual Theme Editor</a>
        </p>
        <label>Color Scheme: 
          <select name="theme.themeSource">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <label>font-family: <input name="theme.font-family"></label>
        <label>background: <input name="theme.background"></label>
        <label>text: <input name="theme.text"></label>
        <label>primary: <input name="theme.primary"></label>
        <label>secondary: <input name="theme.secondary"></label>
        <label>indent: <input name="theme.indent"></label>
        <label>max-width: <input name="theme.max-width"></label>
    </fieldset>
    <fieldset>
        <legend id="llm">llm</legend>
        <label>model: <input name="llm.model"></label>
        <label>enabled: <input name="llm.enabled"></label>
        <label>baseURL: <input name="llm.baseURL"></label>
        <label>apiKey: <input name="llm.apiKey"></label>
    </fieldset>
    <fieldset>
        <legend id="keybindings">Keyboard Shortcuts</legend>
        <label>OpenDevTools: <input name="accelerators.OpenDevTools"></label>
        <label>NewWindow: <input name="accelerators.NewWindow"></label>
        <label>Forward: <input name="accelerators.Forward"></label>
        <label>Back: <input name="accelerators.Back"></label>
        <label>FocusURLBar: <input name="accelerators.FocusURLBar"></label>
        <label>FindInPage: <input name="accelerators.FindInPage"></label>
        <label>Reload: <input name="accelerators.Reload"></label>
        <label>HardReload: <input name="accelerators.HardReload"></label>
        <label>LearnMore: <input name="accelerators.LearnMore"></label>
        <label>OpenExtensionsFolder: <input name="accelerators.OpenExtensionsFolder"></label>
        <label>EditConfigFile: <input name="accelerators.EditConfigFile"></label>
        <label>CreateBookmark: <input name="accelerators.CreateBookmark"></label>
    </fieldset>
    <center>
        <button>Save</button>
    </center>
</form>

<script>
    window.settingsForm.onsubmit = onSettingsChanged
    function $(selector) {
        return document.querySelector(selector)
    }
    function $$(selector) {
        return [...document.querySelectorAll(selector)]
    }
    function onSettings(settings) {
        console.log({ settings })
        for (const [key, value] of Object.entries(settings)) {
            if (typeof value === 'object') {
                for (const [subkey, subvalue] of Object.entries(value)) {
                    const e = $(`[name="${key}.${subkey}"]`)
                    if (e) {
                        if (e.tagName === 'SELECT') {
                            e.value = subvalue
                        } else {
                            e.value = JSON.stringify(subvalue)
                        }
                    }
                }
            } else {
                const e = $(`[name="${key}"]`)
                if (e) {
                    e.value = JSON.stringify(value)
                }
            }
        }
    }

    function onSettingsChanged(e) {
        e.preventDefault()
        const configMap = {}
        try {
            for (const el of $$('#settingsForm input, #settingsForm select')) {
                const { name, value } = el
                if (el.tagName === 'SELECT') {
                    configMap[name] = value
                } else {
                    configMap[name] = JSON.parse(value)
                }
            }
            console.log('saving', configMap)
            settings.save(configMap)
            alert('Saved!')
            location.reload()
        } catch (e) {
            alert(e.message)
        }
    }

    // Handle datalist selection properly with fixes for the identified issues
    const searchProviderInput = document.getElementById('searchProviderInput')

    searchProviderInput.addEventListener('focus', (e) => {
        const currentValue = e.target.value
        if (currentValue && currentValue.startsWith('"') && currentValue.endsWith('"')) {
            e.target.dataset.originalValue = currentValue
            e.target.value = ''
        }
    })

    // Restore original value if user clicks away without selecting
    searchProviderInput.addEventListener('blur', (e) => {
        const currentValue = e.target.value
        if (!currentValue && e.target.dataset.originalValue) {
            e.target.value = e.target.dataset.originalValue
            delete e.target.dataset.originalValue
        }
    })

    // Listen for input events to detect datalist selection
    searchProviderInput.addEventListener('input', (e) => {
        const value = e.target.value
        if (value && !value.startsWith('"') && !value.endsWith('"') && value.includes('://')) {
            const selectedValue = JSON.stringify(value)
            e.target.value = ''
            setTimeout(() => {
                e.target.value = selectedValue
                e.target.blur()
            }, 10)
        }
    })
</script>
